services:
  wiki-db:
    image: pgvector/pgvector:pg16
    container_name: wiki-v2-db
    environment:
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
      POSTGRES_DB: wiki
    ports:
      - '5433:5432'
    volumes:
      - wiki-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./migration-staging:/import:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wiki -d wiki']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  wiki-server:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    container_name: wiki-v2-server
    working_dir: /home/dev/mcp/wiki-v2
    volumes:
      - .:/home/dev/mcp/wiki-v2
    environment:
      DB_HOST: wiki-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-wiki}
      DB_PASSWORD: ${DB_PASSWORD:-wiki}
      DB_NAME: ${DB_NAME:-wiki}
    depends_on:
      wiki-db:
        condition: service_healthy
    command: tail -f /dev/null
    restart: unless-stopped

  wiki-cron:
    build: .
    user: "root"
    container_name: wiki-v2-cron
    working_dir: /home/dev/mcp/wiki-v2
    volumes:
      - .:/home/dev/mcp/wiki-v2
    environment:
      DB_HOST: wiki-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-wiki}
      DB_PASSWORD: ${DB_PASSWORD:-wiki}
      DB_NAME: ${DB_NAME:-wiki}
    depends_on:
      wiki-db:
        condition: service_healthy
    command: sh -c "crontab /etc/cron.d/relink-cron && cron && tail -f /dev/null"
    restart: unless-stopped

volumes:
  wiki-data:
